name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pip-audit

      - name: Basic syntax check
        run: |
          python -m compileall app.py application.py

      - name: Run tests (if present)
        run: |
          set +e
          pytest -q
          test_exit_code=$?
          set -e

          if [ "$test_exit_code" -eq 5 ]; then
            echo "No tests collected yet. Continuing."
            exit 0
          fi

          exit "$test_exit_code"

      - name: Static security scan (Bandit)
        run: |
          bandit -r . -x ./.github,./venv,./.venv,./frontend,./node_modules

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit -r requirements.txt

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Frontend production build
        run: npm run build
