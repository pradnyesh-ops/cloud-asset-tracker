name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety pytest coverage

      - name: Set test environment
        run: |
          echo "SECRET_KEY=ci-secret-key" >> "$GITHUB_ENV"
          echo "DATABASE_URL=sqlite:///:memory:" >> "$GITHUB_ENV"

      - name: Lint (Ruff)
        run: ruff check .

      - name: Static security scan (Bandit)
        run: |
          bandit -r . -x ./.github,./venv,./.venv,./frontend/node_modules -s B101 -f json -o bandit-report.json || true

      - name: Dependency vulnerability scan (Safety)
        run: |
          safety check -r requirements.txt --full-report > safety-report.txt || true

      - name: Run tests and coverage
        run: |
          if [ -d tests ]; then
            coverage run -m pytest
            coverage report --fail-under=45
            coverage xml -i -o coverage.xml
          else
            echo "No tests directory found; skipping pytest for now."
            printf '<coverage version="1"></coverage>' > coverage.xml
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.txt
            coverage.xml
