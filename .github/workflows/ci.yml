name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety pytest coverage

      - name: Lint (Ruff)
        run: |
          ruff check . --quiet || true

      - name: Static security scan (Bandit)
        run: |
          bandit -r . -x ./.github,./venv -f json -o bandit-report.json || true

      - name: Dependency vulnerability scan (Safety)
        run: |
          safety check -r requirements.txt --full-report > safety-report.txt || true

      - name: Run tests and coverage
        run: |
          coverage run -m pytest || true
          coverage xml -i -o coverage.xml || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.txt
            coverage.xml
