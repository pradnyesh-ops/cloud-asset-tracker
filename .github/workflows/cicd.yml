name: CI/CD – cloud-asset-tracker on AWS EC2

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────
  #  JOB 1 — Flask backend checks
  # ──────────────────────────────────────────
  backend-checks:
    name: 🐍 Backend — Tests · Security · Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pip-audit

      - name: Syntax check (app.py + application.py)
        run: python -m compileall app.py application.py

      - name: Run pytest
        run: |
          set +e
          pytest -q
          code=$?
          set -e
          # Exit 5 = no tests collected — pass until tests are added
          [ "$code" -eq 5 ] && echo "No tests yet — skipping." && exit 0
          exit "$code"

      - name: Bandit (security scan)
        run: |
          bandit -r . \
            -x ./.github,./venv,./.venv,./frontend,./node_modules \
            -ll

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt

  # ──────────────────────────────────────────
  #  JOB 2 — React / Vite frontend build check
  #  Confirms the app compiles cleanly in CI.
  #  The real production build happens on EC2
  #  during deploy so the server always has
  #  the latest dist/ without file transfers.
  # ──────────────────────────────────────────
  frontend-checks:
    name: ⚛️ Frontend — Build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Vite build
        run: npm run build

  # ──────────────────────────────────────────
  #  JOB 3 — Deploy to AWS EC2
  #  Only fires on push to main/master once
  #  both check jobs pass. Not on PRs.
  # ──────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    needs: [backend-checks, frontend-checks]
    if: >
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            PROJECT_PATH="$PROJECT_PATH" \
            'bash -s' << 'REMOTE'

            set -e   # abort immediately on any error

            echo "──────────────────────────────────"
            echo "📥  Pull latest code"
            echo "──────────────────────────────────"
            cd "$PROJECT_PATH"
            git pull origin main

            echo "──────────────────────────────────"
            echo "🐍  Activate venv + install deps"
            echo "──────────────────────────────────"
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "──────────────────────────────────"
            echo "⚛️   Build React frontend (Vite)"
            echo "──────────────────────────────────"
            cd frontend
            npm ci --silent
            npm run build        # outputs to frontend/dist/
            cd ..

            echo "──────────────────────────────────"
            echo "🔄  Restart Gunicorn"
            echo "──────────────────────────────────"
            # Entry point matches application.py: `from app import app as application`
            sudo systemctl restart gunicorn

            echo "──────────────────────────────────"
            echo "🌐  Restart Nginx"
            echo "──────────────────────────────────"
            sudo systemctl restart nginx

            echo ""
            echo "✅  Deployment complete!"

          REMOTE