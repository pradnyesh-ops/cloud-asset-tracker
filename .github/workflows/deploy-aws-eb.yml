name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERSION_LABEL: release-${{ github.run_number }}-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APP_NAME }}
          environment_name: ${{ secrets.EB_ENV_NAME }}
          region: ${{ secrets.AWS_REGION }}
          version_label: ${{ env.VERSION_LABEL }}
          deployment_package: .

      - name: Post-deploy health check (optional)
        if: env.EB_HEALTHCHECK_URL != ''
        run: |
          echo "Checking ${EB_HEALTHCHECK_URL}"
          curl --fail --silent --show-error --max-time 20 "${EB_HEALTHCHECK_URL}"
        env:
          EB_HEALTHCHECK_URL: ${{ secrets.EB_HEALTHCHECK_URL }}
